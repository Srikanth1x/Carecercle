<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aayu — Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center px-4">
  <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-xl w-full max-w-md">

    <a href="/" class="font-semibold text-teal-400 text-base tracking-tight block mb-6">Aayu</a>
    <h1 class="text-2xl font-bold text-white mb-1">Create your account</h1>
    <p class="text-sm text-zinc-500 mb-6">Free. No credit card needed.</p>

    {% if error %}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/register" onsubmit="return checkPasswords()">
      <label class="block text-sm font-medium text-zinc-300 mb-1">Email</label>
      <input name="email" id="email" type="email" required autocomplete="email"
             class="w-full rounded-lg px-3 py-2 mb-4 text-sm border" />

      <label class="block text-sm font-medium text-zinc-300 mb-1">Password</label>
      <input name="password" id="password" type="password" required minlength="6"
             class="w-full rounded-lg px-3 py-2 mb-4 text-sm border" />

      <label class="block text-sm font-medium text-zinc-300 mb-1">Confirm password</label>
      <input id="confirm" type="password" required
             class="w-full rounded-lg px-3 py-2 mb-1 text-sm border" />
      <p id="pw-error" class="text-red-400 text-xs mb-4 hidden">Passwords do not match.</p>

      <button type="submit"
              class="w-full bg-teal-500 hover:bg-teal-400 text-zinc-950 font-medium py-2.5 rounded-lg transition-colors mt-2">
        Create account
      </button>
    </form>

    <p class="text-sm text-center mt-5 text-zinc-500">
      Already have an account? <a href="/login" class="text-teal-400 hover:text-teal-300">Login</a>
    </p>
  </div>

  <script>
    function checkPasswords() {
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      const err = document.getElementById('pw-error');
      if (pw !== cf) {
        err.classList.remove('hidden');
        return false;
      }
      err.classList.add('hidden');
      return true;
    }
  </script>
</body>
</html>
