{% extends "base.html" %}
{% block title %}Add Lab Result{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/labs" class="text-blue-600 text-sm hover:underline">← Back</a>
    <h1 class="text-2xl font-bold">🔬 Add Lab Result</h1>
  </div>

  {% if error %}
    <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/labs/add" class="bg-white rounded-xl shadow p-6 space-y-5">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Test Name <span class="text-red-500">*</span></label>
      <input name="test_name" type="text" required placeholder="e.g. HbA1c"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Value <span class="text-red-500">*</span></label>
        <input name="test_value" type="text" required placeholder="e.g. 7.2"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Unit</label>
        <input name="unit" type="text" placeholder="e.g. %"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Reference Range</label>
        <input name="reference_range" type="text" placeholder="e.g. 4.0–5.6%"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Test Date <span class="text-red-500">*</span></label>
        <input name="test_date" type="date" required
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Lab Name</label>
        <input name="lab_name" type="text" placeholder="e.g. SRL Diagnostics"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="flex items-center gap-3">
      <input name="is_abnormal" type="checkbox" id="is_abnormal" class="w-4 h-4 text-red-600" />
      <label for="is_abnormal" class="text-sm font-medium text-gray-700">Mark as abnormal</label>
    </div>

    <button type="submit"
            class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 transition">
      Add Lab Result
    </button>
  </form>
</div>
{% endblock %}
