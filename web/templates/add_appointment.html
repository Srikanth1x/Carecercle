{% extends "base.html" %}
{% block title %}Add Appointment{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/dashboard" class="text-blue-600 text-sm hover:underline">← Back</a>
    <h1 class="text-2xl font-bold">🗓️ Add Appointment</h1>
  </div>

  {% if error %}
    <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/appointments/add" class="bg-white rounded-xl shadow p-6 space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Date & Time <span class="text-red-500">*</span></label>
        <input name="appointment_date" type="datetime-local" required
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
        <select name="appointment_type"
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="Follow-up">Follow-up</option>
          <option value="Consultation">Consultation</option>
          <option value="Lab Test">Lab Test</option>
          <option value="Procedure">Procedure</option>
          <option value="Emergency">Emergency</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Doctor Name</label>
        <input name="doctor_name" type="text" placeholder="e.g. Dr. Anjali Singh"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Hospital / Clinic</label>
        <input name="hospital" type="text" placeholder="e.g. Apollo Hospital"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Prerequisites</label>
      <input name="prerequisites" type="text" placeholder="e.g. Fasting blood test, ECG"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      <p class="text-xs text-gray-400 mt-1">Comma-separated tasks needed before the appointment</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <textarea name="notes" rows="3" placeholder="Any additional notes..."
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
    </div>

    <button type="submit"
            class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 transition">
      Add Appointment
    </button>
  </form>
</div>
{% endblock %}
