{% extends "base.html" %}
{% block title %}Add Appointment{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/dashboard" class="text-teal-400 hover:text-teal-300 text-sm">Back</a>
    <h1 class="text-2xl font-bold text-white">Add Appointment</h1>
  </div>

  {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/appointments/add" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Date and Time <span class="text-red-400">*</span></label>
        <input name="appointment_date" type="datetime-local" required
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Type</label>
        <select name="appointment_type"
                class="w-full rounded-lg px-3 py-2 text-sm border">
          <option value="Follow-up">Follow-up</option>
          <option value="Consultation">Consultation</option>
          <option value="Lab Test">Lab Test</option>
          <option value="Procedure">Procedure</option>
          <option value="Emergency">Emergency</option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Doctor Name</label>
        <input name="doctor_name" type="text" placeholder="e.g. Dr. Anjali Singh"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Hospital / Clinic</label>
        <input name="hospital" type="text" placeholder="e.g. Apollo Hospital"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Prerequisites</label>
      <input name="prerequisites" type="text" placeholder="e.g. Fasting blood test, ECG"
             class="w-full rounded-lg px-3 py-2 text-sm border" />
      <p class="text-xs text-zinc-600 mt-1">Comma-separated tasks needed before the appointment</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Notes</label>
      <textarea name="notes" rows="3" placeholder="Any additional notes..."
                class="w-full rounded-lg px-3 py-2 text-sm border"></textarea>
    </div>

    <button type="submit"
            class="w-full bg-teal-500 hover:bg-teal-400 text-zinc-950 font-medium py-2.5 rounded-lg transition-colors">
      Add Appointment
    </button>
  </form>
</div>
{% endblock %}
