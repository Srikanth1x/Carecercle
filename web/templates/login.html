<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareCircle — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-xl shadow w-full max-w-md">

    <a href="/" class="text-blue-700 font-bold text-lg block mb-6">💙 CareCircle</a>
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Welcome back</h1>

    {% if registered %}
      <div class="bg-green-50 text-green-700 text-sm px-4 py-3 rounded mb-4">
        Account created! Please log in.
      </div>
    {% endif %}

    {% if error %}
      <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input name="email" type="email" required autocomplete="email"
             class="w-full border rounded-lg px-3 py-2 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />

      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input name="password" type="password" required autocomplete="current-password"
             class="w-full border rounded-lg px-3 py-2 mb-6 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />

      <button type="submit"
              class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 transition">
        Login
      </button>
    </form>

    <p class="text-sm text-center mt-5 text-gray-500">
      No account yet? <a href="/register" class="text-blue-600 underline">Create one free</a>
    </p>
  </div>
</body>
</html>
