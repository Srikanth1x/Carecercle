<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareCircle — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center px-4">
  <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-xl w-full max-w-md">

    <a href="/" class="font-semibold text-teal-400 text-base tracking-tight block mb-6">CareCircle</a>
    <h1 class="text-2xl font-bold text-white mb-6">Welcome back</h1>

    {% if registered %}
      <div class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm px-4 py-3 rounded-lg mb-4">
        Account created. Please log in.
      </div>
    {% endif %}

    {% if error %}
      <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <label class="block text-sm font-medium text-zinc-300 mb-1">Email</label>
      <input name="email" type="email" required autocomplete="email"
             class="w-full rounded-lg px-3 py-2 mb-4 text-sm border" />

      <label class="block text-sm font-medium text-zinc-300 mb-1">Password</label>
      <input name="password" type="password" required autocomplete="current-password"
             class="w-full rounded-lg px-3 py-2 mb-6 text-sm border" />

      <button type="submit"
              class="w-full bg-teal-500 hover:bg-teal-400 text-zinc-950 font-medium py-2.5 rounded-lg transition-colors">
        Login
      </button>
    </form>

    <p class="text-sm text-center mt-5 text-zinc-500">
      No account yet? <a href="/register" class="text-teal-400 hover:text-teal-300">Create one free</a>
    </p>
  </div>
</body>
</html>
