<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareCircle — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <nav class="bg-zinc-900 border-b border-zinc-800 px-6 py-3 flex items-center gap-6">
    <a href="/dashboard" class="font-semibold text-teal-400 text-base tracking-tight">CareCircle</a>
    <a href="/dashboard" class="text-zinc-300 hover:text-white text-sm transition-colors">Dashboard</a>
    <a href="/medications" class="text-zinc-300 hover:text-white text-sm transition-colors">Medications</a>
    <a href="/labs" class="text-zinc-300 hover:text-white text-sm transition-colors">Labs</a>
    <a href="/timeline" class="text-zinc-300 hover:text-white text-sm transition-colors">Timeline</a>
    <a href="/alerts" class="text-zinc-300 hover:text-white text-sm transition-colors">Alerts</a>
    <a href="/appointments" class="text-zinc-300 hover:text-white text-sm transition-colors">Appointments</a>
    <span class="ml-auto flex items-center gap-4">
      <a href="/upload" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 text-sm px-3 py-1 rounded transition-colors">+ Upload</a>
      <a href="/logout" class="text-sm text-zinc-500 hover:text-zinc-300 transition-colors">Logout</a>
    </span>
  </nav>

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
