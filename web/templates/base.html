<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareCircle — {% block title %}Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">

  <nav class="bg-zinc-900 border-b border-zinc-800 px-6 py-3 flex items-center gap-6">
    <a href="/dashboard" class="font-semibold text-teal-400 text-base tracking-tight">CareCircle</a>
    <a href="/dashboard" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Dashboard</a>
    <a href="/medications" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Medications</a>
    <a href="/labs" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Labs</a>
    <a href="/timeline" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Timeline</a>
    <a href="/alerts" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Alerts</a>
    <a href="/appointments" class="nav-link text-zinc-300 hover:text-white text-sm transition-colors">Appointments</a>

    {% if all_patients is defined and all_patients %}
    <div class="relative" id="patient-switcher">
      <button onclick="document.getElementById('pmenu').classList.toggle('hidden')"
              class="flex items-center gap-1.5 text-sm bg-zinc-800/80 border border-zinc-700 text-zinc-300 hover:text-white px-3 py-1 rounded transition-colors">
        <span>{{ patient.full_name if patient else "Select" }}</span>
        <svg class="w-3 h-3 text-zinc-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
      <div id="pmenu" class="hidden absolute top-9 left-0 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl min-w-44 py-1 z-50">
        {% for p in all_patients %}
        <a href="/patients/switch/{{ p.id }}"
           class="block px-4 py-2 text-sm transition-colors {% if patient and p.id == patient.id %}text-teal-400 font-medium{% else %}text-zinc-300 hover:text-white hover:bg-zinc-800{% endif %}">
          {{ p.full_name }}
        </a>
        {% endfor %}
        <div class="border-t border-zinc-800 my-1"></div>
        <a href="/patient/new" class="block px-4 py-2 text-sm text-zinc-500 hover:text-zinc-300 hover:bg-zinc-800 transition-colors">+ Add Patient</a>
      </div>
    </div>
    {% endif %}

    <span class="ml-auto flex items-center gap-4">
      <a href="/upload" class="bg-teal-500/10 border border-teal-500/30 text-teal-400 hover:bg-teal-500/20 text-sm px-3 py-1 rounded transition-colors">+ Upload</a>
      <a href="/logout" class="text-sm text-zinc-500 hover:text-zinc-300 transition-colors">Logout</a>
    </span>
  </nav>
  <script>
    const path = location.pathname.split('/')[1];
    document.querySelectorAll('.nav-link').forEach(a => {
      const href = a.getAttribute('href').replace('/', '');
      const match = href === '' ? path === '' || path === 'dashboard' : path === href;
      if (match) {
        a.classList.add('text-teal-400', 'font-medium');
        a.classList.remove('text-zinc-300');
      }
    });
    document.addEventListener('click', function(e) {
      const sw = document.getElementById('patient-switcher');
      if (sw && !sw.contains(e.target)) {
        const menu = document.getElementById('pmenu');
        if (menu) menu.classList.add('hidden');
      }
    });
  </script>

  <main class="max-w-5xl mx-auto px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/script.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
