{% extends "base.html" %}
{% block title %}Add Care Event{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/timeline" class="text-blue-600 text-sm hover:underline">← Back</a>
    <h1 class="text-2xl font-bold">📝 Add Care Event</h1>
  </div>

  {% if error %}
    <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/events/add" class="bg-white rounded-xl shadow p-6 space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Event Type <span class="text-red-500">*</span></label>
        <select name="event_type" required
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">— Select —</option>
          <option value="medication_given">Medication Given</option>
          <option value="doctor_visit">Doctor Visit</option>
          <option value="symptom_reported">Symptom Reported</option>
          <option value="vital_check">Vital Check</option>
          <option value="meal">Meal</option>
          <option value="observation">Observation</option>
          <option value="caregiver_note">Caregiver Note</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Severity</label>
        <select name="severity"
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="normal">Normal</option>
          <option value="moderate">Moderate</option>
          <option value="severe">Severe</option>
          <option value="critical">Critical</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-red-500">*</span></label>
      <textarea name="event_description" required rows="4"
                placeholder="e.g. Dad took his morning medications. BP reading: 130/85."
                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Reported By</label>
      <input name="reported_by" type="text" placeholder="e.g. Meera (caregiver)"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <button type="submit"
            class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 transition">
      Add Event
    </button>
  </form>
</div>
{% endblock %}
