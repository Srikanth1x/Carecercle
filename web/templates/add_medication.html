{% extends "base.html" %}
{% block title %}Add Medication{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/medications" class="text-blue-600 text-sm hover:underline">← Back</a>
    <h1 class="text-2xl font-bold">💊 Add Medication</h1>
  </div>

  {% if error %}
    <div class="bg-red-50 text-red-600 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/medications/add" class="bg-white rounded-xl shadow p-6 space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-gray-700 mb-1">Drug Name <span class="text-red-500">*</span></label>
        <input name="drug_name" type="text" required placeholder="e.g. Metformin"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dosage <span class="text-red-500">*</span></label>
        <input name="dosage" type="text" required placeholder="e.g. 500mg"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Frequency <span class="text-red-500">*</span></label>
        <input name="frequency" type="text" required placeholder="e.g. Twice daily"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Timing</label>
        <input name="timing" type="text" placeholder="e.g. After meals"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Route</label>
        <select name="route" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="oral">Oral</option>
          <option value="topical">Topical</option>
          <option value="injection">Injection</option>
          <option value="inhaled">Inhaled</option>
          <option value="sublingual">Sublingual</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Purpose</label>
      <input name="purpose" type="text" placeholder="e.g. Blood sugar control"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Prescribed Date</label>
        <input name="prescribed_date" type="date"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Doctor Name</label>
        <input name="doctor_name" type="text" placeholder="e.g. Dr. Anjali Singh"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <button type="submit"
            class="w-full bg-blue-700 text-white py-2.5 rounded-lg font-medium hover:bg-blue-800 transition">
      Add Medication
    </button>
  </form>
</div>
{% endblock %}
