{% extends "base.html" %}
{% block title %}Add Medication{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/medications" class="text-teal-400 hover:text-teal-300 text-sm">Back</a>
    <h1 class="text-2xl font-bold text-white">Add Medication</h1>
  </div>

  {% if error %}
    <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm px-4 py-3 rounded-lg mb-4">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/medications/add" class="bg-zinc-900 border border-zinc-800 rounded-xl p-6 space-y-5">

    <div class="grid grid-cols-2 gap-4">
      <div class="col-span-2">
        <label class="block text-sm font-medium text-zinc-300 mb-1">Drug Name <span class="text-red-400">*</span></label>
        <input name="drug_name" type="text" required placeholder="e.g. Metformin"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Dosage <span class="text-red-400">*</span></label>
        <input name="dosage" type="text" required placeholder="e.g. 500mg"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Frequency <span class="text-red-400">*</span></label>
        <input name="frequency" type="text" required placeholder="e.g. Twice daily"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Timing</label>
        <input name="timing" type="text" placeholder="e.g. After meals"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Route</label>
        <select name="route" class="w-full rounded-lg px-3 py-2 text-sm border">
          <option value="oral">Oral</option>
          <option value="topical">Topical</option>
          <option value="injection">Injection</option>
          <option value="inhaled">Inhaled</option>
          <option value="sublingual">Sublingual</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-zinc-300 mb-1">Purpose</label>
      <input name="purpose" type="text" placeholder="e.g. Blood sugar control"
             class="w-full rounded-lg px-3 py-2 text-sm border" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Prescribed Date</label>
        <input name="prescribed_date" type="date"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
      <div>
        <label class="block text-sm font-medium text-zinc-300 mb-1">Doctor Name</label>
        <input name="doctor_name" type="text" placeholder="e.g. Dr. Anjali Singh"
               class="w-full rounded-lg px-3 py-2 text-sm border" />
      </div>
    </div>

    <button type="submit"
            class="w-full bg-teal-500 hover:bg-teal-400 text-zinc-950 font-medium py-2.5 rounded-lg transition-colors">
      Add Medication
    </button>
  </form>
</div>
{% endblock %}
